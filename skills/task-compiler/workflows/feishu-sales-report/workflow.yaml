workflow:
  name: feishu-sales-report
  description: 飞书综合数据报告：数据生成 → IR 构建 → Agent 摘要 → 渲染
  mode: static
  on_failure: abort
  nodes:
    # ── Wave 0: 数据生成（独立并行） ──
    - id: generate-data-1
      type: program
      description: 生成产品销售假数据
      capture: sales_data
      idempotent: true
      command: python ./workflows/feishu-sales-report/generate_data.py

    - id: generate-data-2
      type: program
      description: 生成区域客户假数据
      capture: customer_data
      idempotent: true
      command: python ./workflows/feishu-sales-report/generate_data_v2.py

    # ── Wave 1: IR 骨架构建（纯数据，无 lark-cli）──
    - id: build-ir
      type: program
      description: 计算统计数据，输出含 render-order pragma 的 IR
      capture: ir_skeleton
      idempotent: true
      depends_on:
        - generate-data-1
        - generate-data-2
      command: >
        python ./workflows/feishu-sales-report/build_ir.py
        --output-dir {{ session.output_dir }}
        --result1 {{ nodes.generate-data-1.result_file }}
        --result2 {{ nodes.generate-data-2.result_file }}

    # ── Wave 2: Agent 生成子总结（纯文本，无 side effect）──
    - id: summary-2-2
      type: agent
      description: 分析销售数据，生成 2.2 子总结
      depends_on:
        - build-ir
      output:
        files:
          - result.md
      prompt: |
        你是一个数据分析师。基于产品销售数据生成「2.2 总结」章节。

        ## 输入数据
        从 context.json 的 input_sources 中找到 build-ir 节点的输出，
        其中包含 IR YAML。从中提取：
        - `_stats.sales`：各指标的统计数据（均值、最小值、最大值）
        - `_stats.sales_overview`：概要文本
        - `sheets.sales`：原始数据表（headers + rows）

        ## 输出要求
        撰写 150-250 字的专业数据总结，覆盖：
        - 总营收和总订单量
        - 表现最好/最差的产品及月份
        - 产品间对比分析
        - 数据洞察

        将结果以 Markdown 格式写入 context.json 中 output_files 指定的文件。

    - id: summary-3-2
      type: agent
      description: 分析区域客户数据，生成 3.2 子总结
      depends_on:
        - build-ir
      output:
        files:
          - result.md
      prompt: |
        你是一个数据分析师。基于区域客户数据生成「3.2 总结」章节。

        ## 输入数据
        从 context.json 的 input_sources 中找到 build-ir 节点的输出，
        其中包含 IR YAML。从中提取：
        - `_stats.customers`：各指标的统计数据（均值、最小值、最大值）
        - `_stats.customers_overview`：概要文本
        - `sheets.customers`：原始数据表（headers + rows）

        ## 输出要求
        撰写 150-250 字的专业数据总结，覆盖：
        - 总访问量、总注册数、总订单数、平均转化率
        - 各区域对比（访问量最高、转化率最高等）
        - 季度趋势
        - 数据洞察和建议

        将结果以 Markdown 格式写入 context.json 中 output_files 指定的文件。

    # ── Wave 3: Agent 生成最终总结 ──
    - id: summary-1
      type: agent
      description: 综合两份子总结，生成 1. 最终总结
      depends_on:
        - summary-2-2
        - summary-3-2
      output:
        files:
          - result.md
      prompt: |
        你是一个数据分析师。综合产品销售和区域客户两份子总结，
        生成报告最终的「1. 总结」章节。

        ## 输入数据
        读取 summary-2-2 和 summary-3-2 的输出文件（result.md）获取两份子总结内容。
        文件路径规则：`<output-dir>/agents/<node-id>/result.md`。
        ## 输出要求
        撰写 300-500 字的综合性报告总结，覆盖：
        - 两组数据的核心发现
        - 跨模块对比和关联分析
        - 关键指标总结
        - 业务洞察和建议

        将结果以 Markdown 格式写入 context.json 中 output_files 指定的文件。

    # ── Post-Phase-3: 渲染为飞书文档 ──
    - id: render-doc
      type: plugin
      description: 消费完整 IR，通过 render-feishu 插件创建飞书云文档
      plugin: render-feishu
      depends_on:
        - build-ir
        - summary-1

    # ── Wave 4: 数据可视化 ──
    - id: apply-data-bars
      type: agent
      description: 为两个表格的数字列添加绿色渐变数据条
      requires:
        skills:
          - lark-sheets
        tools:
          - lark-cli
      depends_on:
        - render-doc
      output:
        files:
          - result.md
      prompt: |
        为飞书文档中两个嵌入式表格的数字列添加绿色渐变数据条。

        ## Sheet 信息

        render-doc 节点的输出提供了 spreadsheet_token 和 sheet_id：
        ```
        {{ nodes.render-doc.result }}
        ```

        - sheets[0]：**产品销售表**，表头 [产品名称, 月份, 销量, 单价（元）, 销售额（元）]
        - sheets[1]：**区域客户表**，表头 [区域, 季度, 访问量, 注册数, 订单数, 转化率(%)]

        ## 需要添加数据条的数字列

        产品销售表（从第 2 行开始到数据末尾）：
        - C 列（销量）
        - D 列（单价）
        - E 列（销售额）

        区域客户表（从第 2 行开始到数据末尾）：
        - C 列（访问量）
        - D 列（注册数）
        - E 列（订单数）
        - F 列（转化率）

        ## 执行步骤

        1. 先通过 `lark-cli sheets +cond-format-create --print-schema --flag-name properties` 查看 dataBar 规则需要的完整 properties 结构
        2. 对每个数字列执行 `lark-cli sheets +cond-format-create`，使用 `--rule-type dataBar`
        3. 数据条使用绿色渐变配色
        4. 每列单独创建一条规则
        5. 创建后通过 `+cond-format-list` 验证数据条已生效

        将执行结果（sheet token、各列规则 id）写入 output_files 中指定的文件。